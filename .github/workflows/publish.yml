name: Publish to PyPI

on:
  push:
    tags:
      - 'v*'

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write      # create GitHub releases
      id-token: write      # Trusted Publishing (PyPI OIDC — no stored token)

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install build tools
        run: pip install build

      - name: Patch image URLs to use git tag
        env:
          TAG: ${{ github.ref_name }}
          REPO: Shrivastava-Aditya/boolean-algebra-engine-python
        run: |
          sed -i "s|https://raw.githubusercontent.com/${REPO}/[^/]*/images/|https://raw.githubusercontent.com/${REPO}/${TAG}/images/|g" README.md

      - name: Build
        run: python -m build

      - name: Restore README
        run: git checkout README.md

      - name: Publish to PyPI (Trusted Publishing)
        uses: pypa/gh-action-pypi-publish@release/v1

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create ${{ github.ref_name }} dist/* \
            --title "${{ github.ref_name }}" \
            --generate-notes

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            shrvx/bool-llm-ngn:${{ github.ref_name }}
            shrvx/bool-llm-ngn:latest
