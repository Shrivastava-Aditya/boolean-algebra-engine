<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>You're on the list — Boolean Algebra Engine</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root { --bg: #0a0a0a; --surface: #141414; --border: #2a2a2a; --text: #f0f0f0; --muted: #777; --green: #3fb950; }
  body { background: var(--bg); color: var(--text); font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 24px; }
  .card { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 48px; max-width: 420px; text-align: center; }
  .icon { font-size: 2.5rem; margin-bottom: 20px; }
  h1 { font-size: 1.5rem; font-weight: 700; margin-bottom: 12px; }
  p { color: var(--muted); font-size: 0.95rem; line-height: 1.6; margin-bottom: 28px; }
  a { display: inline-block; padding: 10px 24px; background: #f0f0f0; color: #0a0a0a; border-radius: 6px; font-size: 0.9rem; font-weight: 600; text-decoration: none; }
  a:hover { opacity: 0.85; }
</style>
</head>
<body>
<div class="card">
  <div class="icon">✓</div>
  <h1>You're on the list.</h1>
  <p>We'll reach out as soon as your tier opens up. One email, no spam.</p>
  <a href="index.html">Back to the engine</a>
</div>
</body>
</html>
